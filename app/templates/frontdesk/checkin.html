{% extends "base.html" %}{% block title %}住宿登记 - 酒店预订系统{% endblock %}
{% block content %}
<div class="mb-3"><h4><i class="bi bi-person-plus"></i> 住宿登记</h4></div>
<div class="row"><div class="col-lg-7">
<div class="card "><div class="card-body">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{csrf_token()}}">
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">客户姓名 <span class="text-danger">*</span></label><input type="text" class="form-control" name="customer_name" required placeholder="请输入客户姓名"></div>
        <div class="col-md-6"><label class="form-label">联系电话 <span class="text-danger">*</span></label><input type="text" class="form-control" name="phone" required placeholder="手机号"></div>
        <div class="col-md-6"><label class="form-label">身份证号</label><input type="text" class="form-control" name="id_card" placeholder="选填"></div>
        <div class="col-md-6"><label class="form-label">分配房间 <span class="text-danger">*</span></label><select class="form-select" name="room_id" required>{% for r in form.room_id.choices %}<option value="{{r[0]}}">{{r[1]}}</option>{% endfor %}</select></div>
        <div class="col-md-6"><label class="form-label">预计退房日期 <span class="text-danger">*</span></label><input type="date" class="form-control" name="check_out" id="check_out_date" required></div>
        <div class="col-md-6"><label class="form-label">押金（元）</label><input type="number" step="0.01" class="form-control" name="deposit" value="0"></div>
        <div class="col-12"><label class="form-label">备注</label><textarea class="form-control" name="remark" rows="2" maxlength="256"></textarea></div>
        <div class="col-12"><button type="submit" class="btn btn-primary px-4"><i class="bi bi-check-lg"></i> 确认入住</button></div>
    </div>
</form>
</div></div>
</div><div class="col-lg-5 mt-3 mt-lg-0">
<div class="card "><div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-info-circle"></i> 入住须知</h6></div><div class="card-body small text-muted"><ol><li>选择空闲房间并填写客户信息</li><li>入住时间默认为当前系统时间</li><li>退房时间为每日12:00前</li><li>押金将在退房结算时退还</li></ol></div></div>
</div></div>
{% endblock %}
{% block extra_js %}<script>document.getElementById('check_out_date').setAttribute('min',new Date().toISOString().split('T')[0]);</script>{% endblock %}
